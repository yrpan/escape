<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Escape from Diddy Epstein</title>
  <style>
    * {
      user-select: none;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background-image: url('image/background.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-color: #0a0c12;
      color: #eef4ff;
      font-family: 'Segoe UI', 'Courier New', monospace;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .game-container {
      background: rgba(26, 31, 42, 0.85);
      backdrop-filter: blur(4px);
      padding: 20px;
      border-radius: 32px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 900px;
      margin: auto;
    }
    .canvas-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 800px;
      border-radius: 16px;
      box-shadow: 0 0 0 2px #2e3a4e, 0 10px 25px rgba(0,0,0,0.5);
      cursor: pointer;
    }
    .controls-panel {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 20px 0 8px 0;
      background: #0f121c;
      padding: 12px 20px;
      border-radius: 60px;
    }
    .ctrl-card {
      background: #1e2436;
      border-radius: 24px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 4px 8px rgba(0,0,0,0.3);
    }
    .ctrl-color {
      width: 24px;
      height: 24px;
      border-radius: 8px;
    }
    .ctrl-keys {
      font-family: monospace;
      background: #0b0e16;
      padding: 4px 8px;
      border-radius: 32px;
      letter-spacing: 1px;
      font-size: 11px;
    }
    button {
      background: #2c3e66;
      border: none;
      color: white;
      font-weight: bold;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 40px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 6px black;
    }
    button:hover {
      background: #3e5a85;
      transform: scale(0.97);
    }
    .status {
      background: rgba(11, 15, 24, 0.9);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: bold;
      display: inline-block;
      margin-top: 12px;
    }
    h2 {
      margin: 5px 0 0 0;
      font-size: 1.5rem;
      letter-spacing: 1px;
      font-weight: 600;
      background: linear-gradient(135deg, #c0e0ff, #a0c0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .note {
      font-size: 10px;
      color: #ccc;
      margin-top: 8px;
    }
    .button-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    @media (max-width: 600px) {
      .ctrl-card {
        padding: 4px 8px;
        font-size: 10px;
      }
      .ctrl-keys {
        font-size: 9px;
      }
      button {
        padding: 8px 16px;
        font-size: 12px;
      }
      h2 {
        font-size: 1.2rem;
      }
      .status {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <h2>ESCAPE FROM DIDDY EPSTEIN</h2>
  <div class="canvas-wrapper">
    <canvas id="game" width="800" height="800"></canvas>
  </div>
  <div class="controls-panel">
    <div class="ctrl-card"><div class="ctrl-color" style="background:#00ffff;"></div><span class="ctrl-keys">W A S D</span><span>P1</span></div>
    <div class="ctrl-card"><div class="ctrl-color" style="background:#ffff44;"></div><span class="ctrl-keys">⬆️ ⬇️ ⬅️ ➡️</span><span>P2</span></div>
    <div class="ctrl-card"><div class="ctrl-color" style="background:#ff66cc;"></div><span class="ctrl-keys">I K J L</span><span>P3</span></div>
    <div class="ctrl-card"><div class="ctrl-color" style="background:#66ff99;"></div><span class="ctrl-keys">Y N H M</span><span>P4</span></div>
  </div>
  <div class="button-group">
    <button onclick="startGame()">▶ START GAME</button>
    <button onclick="restartGame()">🔄 RESTART</button>
    <button id="fullscreenBtn">FULLSCREEN MODE</button>
    <button id="muteBtn">🔊 TURN OFF THE MUSIC</button>
  </div>
  <div id="gameStatus" class="status">When Ready, Press Start</div>
  <div class="note">Satirical Game by Y.R. Pan</div>
</div>

<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const statusDiv = document.getElementById("gameStatus");

  const TILE = 32;
  const ROWS = 25;
  const COLS = 25;

  // ---------- AUDIO & IMAGE ASSETS (placeholders — user will replace paths) ----------
  const soundStart = new Audio("sound/iwantiget.m4a");
  const soundEnd = new Audio("sound/assertthesixth.m4a");
  const captureSounds = [
    new Audio("sound/savage.m4a"),
    new Audio("sound/pdiddyno.m4a"),
    new Audio("sound/pleaseletmetell.m4a")
  ];
  
  // Background music (looping)
  const bgMusic = new Audio("sound/background.m4a");
  bgMusic.loop = true;
  let bgMuted = false;
  const muteBtn = document.getElementById("muteBtn");
  muteBtn.addEventListener("click", () => {
    bgMuted = !bgMuted;
    bgMusic.muted = bgMuted;
    muteBtn.textContent = bgMuted ? "🔇 UNMUTE" : "🔊 MUTE";
  });

  let minotaurImg1 = new Image();
  let minotaurImg2 = new Image();
  minotaurImg1.src = "image/diddy.png";
  minotaurImg2.src = "image/epstein.png";
  
  let imagesLoaded = false;
  let img1Loaded = false, img2Loaded = false;
  minotaurImg1.onload = () => { img1Loaded = true; updateImagesReady(); };
  minotaurImg2.onload = () => { img2Loaded = true; updateImagesReady(); };
  function updateImagesReady() { imagesLoaded = img1Loaded && img2Loaded; }
  
  function playSound(audioObj) {
    if (!audioObj) return;
    audioObj.currentTime = 0;
    audioObj.play().catch(e => console.warn("Audio play failed:", e));
  }
  
  function playRandomCaptureSound() {
    const idx = Math.floor(Math.random() * captureSounds.length);
    playSound(captureSounds[idx]);
  }

  // Function to start background music (if not already playing)
  function startBackgroundMusic() {
    if (!bgMusic.paused) return;
    bgMusic.play().catch(e => console.warn("Background music play failed:", e));
  }
  
  // Stop background music (optional, but can be used)
  function stopBackgroundMusic() {
    if (!bgMusic.paused) {
      bgMusic.pause();
      bgMusic.currentTime = 0;
    }
  }
  
  // Restart background music (e.g., on restart)
  function restartBackgroundMusic() {
    stopBackgroundMusic();
    startBackgroundMusic();
  }

  // ---------- MAZE GENERATION (guaranteed connectivity) ----------
  function generateMazeWithConnectivity() {
    const maxAttempts = 25;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      const maze = Array(ROWS).fill().map(() => Array(COLS).fill(0));
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (y === 0 || x === 0 || y === ROWS-1 || x === COLS-1) maze[y][x] = 1;
          else maze[y][x] = Math.random() < 0.28 ? 1 : 0;
        }
      }
      
      const startPositions = [
        { x: 1, y: 1 },
        { x: COLS-2, y: 1 },
        { x: 1, y: ROWS-2 },
        { x: COLS-3, y: ROWS-2 }
      ];
      const exitTile = { x: COLS-2, y: ROWS-2 };
      
      maze[exitTile.y][exitTile.x] = 0;
      for (let pos of startPositions) {
        if (pos.y >= 0 && pos.y < ROWS && pos.x >= 0 && pos.x < COLS) maze[pos.y][pos.x] = 0;
      }
      
      const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
      const queue = [{ x: exitTile.x, y: exitTile.y }];
      visited[exitTile.y][exitTile.x] = true;
      while (queue.length) {
        const { x, y } = queue.shift();
        const dirs = [[0,1],[1,0],[0,-1],[-1,0]];
        for (let [dx, dy] of dirs) {
          const nx = x + dx;
          const ny = y + dy;
          if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !visited[ny][nx] && maze[ny][nx] === 0) {
            visited[ny][nx] = true;
            queue.push({ x: nx, y: ny });
          }
        }
      }
      
      let allReachable = true;
      const checkPoints = [...startPositions, exitTile];
      for (let p of checkPoints) {
        if (!visited[p.y][p.x]) { allReachable = false; break; }
      }
      if (allReachable) return maze;
    }
    // fallback safe maze
    const fallbackMaze = Array(ROWS).fill().map(() => Array(COLS).fill(0));
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (y === 0 || x === 0 || y === ROWS-1 || x === COLS-1) fallbackMaze[y][x] = 1;
        else if (y % 2 === 0 && x % 2 === 0 && !(y===1 && x===1) && !(y===1 && x===COLS-2) && !(y===ROWS-2 && x===1) && !(y===ROWS-2 && x===COLS-3)) {
          fallbackMaze[y][x] = Math.random() < 0.4 ? 1 : 0;
        } else fallbackMaze[y][x] = 0;
      }
    }
    fallbackMaze[1][1] = 0; fallbackMaze[1][COLS-2] = 0;
    fallbackMaze[ROWS-2][1] = 0; fallbackMaze[ROWS-2][COLS-3] = 0;
    fallbackMaze[ROWS-2][COLS-2] = 0;
    return fallbackMaze;
  }

  let maze = generateMazeWithConnectivity();
  const exitPos = { x: COLS-2, y: ROWS-2 };

  // ---------- PLAYER DEFINITIONS (4 players) ----------
  let players = [];
  let minotaurs = [];
  let gameRunning = false;
  let frameCounter = 0;
  let endSoundTimeout = null;

  // Countdown variables
  let countdownActive = false;
  let countdownSeconds = 0;
  let countdownInterval = null;

  // key mapping
  const keyActions = {
    "w": { pid: 0, dx: 0, dy: -1 },
    "s": { pid: 0, dx: 0, dy: 1 },
    "a": { pid: 0, dx: -1, dy: 0 },
    "d": { pid: 0, dx: 1, dy: 0 },
    "ArrowUp": { pid: 1, dx: 0, dy: -1 },
    "ArrowDown": { pid: 1, dx: 0, dy: 1 },
    "ArrowLeft": { pid: 1, dx: -1, dy: 0 },
    "ArrowRight": { pid: 1, dx: 1, dy: 0 },
    "i": { pid: 2, dx: 0, dy: -1 },
    "k": { pid: 2, dx: 0, dy: 1 },
    "j": { pid: 2, dx: -1, dy: 0 },
    "l": { pid: 2, dx: 1, dy: 0 },
    "y": { pid: 3, dx: 0, dy: -1 },
    "n": { pid: 3, dx: 0, dy: 1 },
    "h": { pid: 3, dx: -1, dy: 0 },
    "m": { pid: 3, dx: 1, dy: 0 }
  };

  function tryMovePlayer(pid, dx, dy) {
    if (!gameRunning || countdownActive) return;
    const p = players[pid];
    if (!p.alive || p.escaped) return;
    const nx = p.x + dx;
    const ny = p.y + dy;
    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && maze[ny][nx] === 0) {
      p.x = nx;
      p.y = ny;
    }
  }

  // --- minotaur logic with pause on capture and 1-second detection
  function createMinotaur(x, y, id) {
    return {
      x, y, id,
      seenTimer: 0,
      chaseTimer: 0,
      chasing: false,
      targetPlayer: null,
      roamDir: { dx: 0, dy: 0 },
      roamTimer: 0,
      pauseEndTime: 0
    };
  }

  function hasLineOfSight(mino, player) {
    if (!player.alive || player.escaped) return false;
    const dx = player.x - mino.x;
    const dy = player.y - mino.y;
    if (dx === 0 && dy === 0) return true;
    // Only cardinal or diagonal lines are checked
    if (!(dx === 0 || dy === 0 || Math.abs(dx) === Math.abs(dy))) return false;
    const stepX = Math.sign(dx);
    const stepY = Math.sign(dy);
    let x = mino.x + stepX;
    let y = mino.y + stepY;
    while (x !== player.x || y !== player.y) {
      if (maze[y][x] === 1) return false;
      x += stepX;
      y += stepY;
    }
    return true;
  }

  function moveMinotaurs() {
    if (!gameRunning || countdownActive) return;
    const now = Date.now();
    for (let m of minotaurs) {
      if (m.pauseEndTime > now) continue;

      let visiblePlayer = null;
      for (let p of players) {
        if (p.alive && !p.escaped && hasLineOfSight(m, p)) {
          visiblePlayer = p;
          break;
        }
      }
      
      if (visiblePlayer) {
        m.seenTimer++;
        // Detection threshold changed to 60 frames (~1 second at 60fps)
        if (m.seenTimer > 60 && !m.chasing) {
          m.chasing = true;
          m.chaseTimer = 550; // remains ~9 seconds chase duration
          m.targetPlayer = visiblePlayer;
        }
      } else {
        m.seenTimer = Math.max(0, m.seenTimer - 2);
        if (!visiblePlayer && m.chasing && m.targetPlayer && (m.targetPlayer.escaped || !m.targetPlayer.alive)) {
          m.chasing = false;
          m.targetPlayer = null;
        }
      }
      if (m.chasing && (!m.targetPlayer || !m.targetPlayer.alive || m.targetPlayer.escaped)) {
        m.chasing = false;
        m.targetPlayer = null;
        m.chaseTimer = 0;
      }
      if (m.chasing && m.targetPlayer) {
        m.chaseTimer--;
        if (m.chaseTimer <= 0) {
          m.chasing = false;
          m.targetPlayer = null;
        }
      }

      // Roaming (only if not chasing)
      if (!m.chasing) {
        if (m.roamTimer <= 0) {
          m.roamDir.dx = Math.floor(Math.random() * 3) - 1;
          m.roamDir.dy = Math.floor(Math.random() * 3) - 1;
          m.roamTimer = 100 + Math.floor(Math.random() * 51);
        } else {
          m.roamTimer--;
          const nx = m.x + m.roamDir.dx;
          const ny = m.y + m.roamDir.dy;
          if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && maze[ny][nx] === 0) {
            m.x = nx;
            m.y = ny;
          } else {
            m.roamTimer = 0;
          }
        }
      }
      
      if (frameCounter % 34 !== 0) continue;
      if (m.chasing && m.targetPlayer && m.targetPlayer.alive && !m.targetPlayer.escaped) {
        const dx = Math.sign(m.targetPlayer.x - m.x);
        const dy = Math.sign(m.targetPlayer.y - m.y);
        if (dx !== 0 && dy !== 0) {
          if (maze[m.y + dy] && maze[m.y + dy][m.x] === 0) m.y += dy;
          else if (maze[m.y] && maze[m.y][m.x + dx] === 0) m.x += dx;
        } else if (dx !== 0) {
          if (maze[m.y] && maze[m.y][m.x + dx] === 0) m.x += dx;
        } else if (dy !== 0) {
          if (maze[m.y + dy] && maze[m.y + dy][m.x] === 0) m.y += dy;
        }
      }
    }
  }

  // ---- GAME STATE (escape & deaths)
  function handleEscapesAndDeaths() {
    if (!gameRunning || countdownActive) return;
    // escapes
    for (let p of players) {
      if (!p.escaped && p.alive && p.x === exitPos.x && p.y === exitPos.y) {
        p.escaped = true;
        p.alive = false;
        statusDiv.innerText = `${p.colorName} escaped the accursed place`;
        setTimeout(() => {
          if (gameRunning && !countdownActive) statusDiv.innerText = "ESCAPE OR BE EATEN";
        }, 1800);
      }
    }
    // captures
    const now = Date.now();
    for (let m of minotaurs) {
      for (let p of players) {
        if (!p.escaped && p.alive && m.x === p.x && m.y === p.y) {
          p.alive = false;
          p.escaped = false;
          statusDiv.innerText = `${p.colorName} was served as fresh meat 🍖`;
          playRandomCaptureSound();
          m.pauseEndTime = now + 4000;
          m.chasing = false;
          m.targetPlayer = null;
          setTimeout(() => {
            if (gameRunning && !countdownActive) statusDiv.innerText = "ESCAPE OR BE EATEN";
          }, 1500);
        }
      }
    }
  }
  
  function checkGameEnd() {
    if (!gameRunning || countdownActive) return;
    const activePlayers = players.filter(p => p.alive === true && p.escaped === false);
    if (activePlayers.length === 0) {
      const anyEscaped = players.some(p => p.escaped === true);
      if (anyEscaped) {
        const escapedCount = players.filter(p => p.escaped).length;
        statusDiv.innerText = `${escapedCount} player(s) escaped and found freedom! `;
      } else {
        statusDiv.innerText = `GAME OVER — All players were preyed upon by the devils`;
      }
      gameRunning = false;
      
      if (endSoundTimeout) clearTimeout(endSoundTimeout);
      endSoundTimeout = setTimeout(() => {
        playSound(soundEnd);
        endSoundTimeout = null;
      }, 5000);
    }
  }
  
  // ---- DRAWING with countdown overlay
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (maze[y][x] === 1) {
          ctx.fillStyle = "#3a3f4e";
          ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
          ctx.fillStyle = "#2a2e3a";
          ctx.fillRect(x * TILE + 2, y * TILE + 2, TILE - 4, TILE - 4);
        }
      }
    }
    
    ctx.fillStyle = "#2d8f4a";
    ctx.fillRect(exitPos.x * TILE, exitPos.y * TILE, TILE, TILE);
    ctx.fillStyle = "#6fef8a";
    ctx.fillRect(exitPos.x * TILE + 6, exitPos.y * TILE + 6, TILE - 12, TILE - 12);
    ctx.fillStyle = "#c6ffb0";
    ctx.fillRect(exitPos.x * TILE + 12, exitPos.y * TILE + 12, TILE - 24, TILE - 24);
    
    for (let m of minotaurs) {
      const img = (m.id === 0) ? minotaurImg1 : minotaurImg2;
      const imgW = TILE - 4;
      const imgH = TILE - 4;
      const xOff = m.x * TILE + 2;
      const yOff = m.y * TILE + 2;
      
      if (img.complete && img.naturalWidth > 0 && imagesLoaded) {
        ctx.drawImage(img, xOff, yOff, imgW, imgH);
        if (m.chasing) {
          ctx.save();
          ctx.shadowBlur = 12;
          ctx.shadowColor = "#ff6600";
          ctx.drawImage(img, xOff, yOff, imgW, imgH);
          ctx.restore();
        }
      } else {
        ctx.fillStyle = m.chasing ? "#e85d3a" : "#ac4e3b";
        ctx.beginPath();
        ctx.roundRect(xOff, yOff, imgW, imgH, 8);
        ctx.fill();
        ctx.fillStyle = "#2b1e0f";
        ctx.beginPath();
        ctx.arc(m.x * TILE + TILE/2 - 6, m.y * TILE + TILE/2 - 4, 3, 0, Math.PI*2);
        ctx.arc(m.x * TILE + TILE/2 + 6, m.y * TILE + TILE/2 - 4, 3, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(m.x * TILE + TILE/2 - 7, m.y * TILE + TILE/2 - 5, 1.2, 0, Math.PI*2);
        ctx.arc(m.x * TILE + TILE/2 + 5, m.y * TILE + TILE/2 - 5, 1.2, 0, Math.PI*2);
        ctx.fill();
      }
    }
    
    for (let p of players) {
      if (p.alive && !p.escaped) {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.roundRect(p.x * TILE + 5, p.y * TILE + 5, TILE - 10, TILE - 10, 8);
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.font = `bold ${Math.floor(TILE * 0.55)}px monospace`;
        ctx.fillText("⚡", p.x * TILE + TILE/2 - 8, p.y * TILE + TILE/2 + 6);
      } else if (p.escaped) {
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = "#f5e67b";
        ctx.beginPath();
        ctx.arc(p.x * TILE + TILE/2, p.y * TILE + TILE/2, 12, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#ffc107";
        ctx.font = `bold ${Math.floor(TILE * 0.5)}px monospace`;
        ctx.fillText("✨", p.x * TILE + TILE/2 - 8, p.y * TILE + TILE/2 + 6);
        ctx.globalAlpha = 1;
      }
    }

    if (countdownActive) {
      ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = "bold 64px monospace";
      ctx.fillStyle = "#ffffff";
      ctx.shadowBlur = 8;
      ctx.shadowColor = "#000000";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(countdownSeconds.toString(), canvas.width/2, canvas.height/2);
      ctx.font = "24px monospace";
      ctx.fillStyle = "#ffcc88";
      ctx.fillText("GET READY!", canvas.width/2, canvas.height/2 + 80);
      ctx.textAlign = "left";
      ctx.shadowBlur = 0;
    }
  }
  
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2 * r) r = w / 2;
      if (h < 2 * r) r = h / 2;
      this.moveTo(x+r, y);
      this.lineTo(x+w-r, y);
      this.quadraticCurveTo(x+w, y, x+w, y+r);
      this.lineTo(x+w, y+h-r);
      this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      this.lineTo(x+r, y+h);
      this.quadraticCurveTo(x, y+h, x, y+h-r);
      this.lineTo(x, y+r);
      this.quadraticCurveTo(x, y, x+r, y);
      this.closePath();
      return this;
    };
  }
  
  // ---- COUNTDOWN MANAGEMENT
  function startCountdown() {
    if (countdownInterval) clearInterval(countdownInterval);
    countdownActive = true;
    countdownSeconds = 5;
    countdownInterval = setInterval(() => {
      if (countdownActive && countdownSeconds > 1) {
        countdownSeconds--;
      } else if (countdownActive && countdownSeconds === 1) {
        countdownSeconds--;
        clearInterval(countdownInterval);
        countdownActive = false;
        countdownInterval = null;
        statusDiv.innerText = "RUN TO THE DOOR!";
        setTimeout(() => {
          if (gameRunning && !countdownActive) statusDiv.innerText = "ESCAPE OR BE EATEN";
        }, 1500);
      }
    }, 1000);
  }
  
  // ---- GAME INITIALIZATION (setup but not active)
  function resetGame() {
    if (endSoundTimeout) {
      clearTimeout(endSoundTimeout);
      endSoundTimeout = null;
    }
    if (countdownInterval) clearInterval(countdownInterval);
    countdownActive = false;
    countdownInterval = null;
    gameRunning = false;
    
    maze = generateMazeWithConnectivity();
    players = [
      { x: 1, y: 1, color: "#3efff0", colorName: "Wren", alive: true, escaped: false },
      { x: COLS-2, y: 1, color: "#f5e56b", colorName: "Luke", alive: true, escaped: false },
      { x: 1, y: ROWS-2, color: "#ff8cd9", colorName: "Amy", alive: true, escaped: false },
      { x: COLS-3, y: ROWS-2, color: "#a5ff7e", colorName: "Tony", alive: true, escaped: false }
    ];
    const startCoords = [[1,1], [COLS-2,1], [1,ROWS-2], [COLS-3, ROWS-2]];
    for (let [sx, sy] of startCoords) {
      if (maze[sy] && maze[sy][sx] === 1) maze[sy][sx] = 0;
    }
    if (maze[exitPos.y][exitPos.x] === 1) maze[exitPos.y][exitPos.x] = 0;
    
    const midX = Math.floor(COLS/2);
    const midY = Math.floor(ROWS/2);
    let m1x = midX, m1y = midY;
    let m2x = midX+2, m2y = midY+1;
    for (let tries = 0; tries < 20; tries++) {
      if (maze[m1y] && maze[m1y][m1x] === 0) break;
      m1x = midX + (tries % 3) - 1;
      m1y = midY + Math.floor(tries/3) - 1;
    }
    for (let tries = 0; tries < 20; tries++) {
      if (maze[m2y] && maze[m2y][m2x] === 0 && (m2x !== m1x || m2y !== m1y)) break;
      m2x = midX + 2 + (tries % 4) - 2;
      m2y = midY + 1 + Math.floor(tries/4) - 1;
    }
    minotaurs = [
      createMinotaur(Math.min(COLS-2, Math.max(1, m1x)), Math.min(ROWS-2, Math.max(1, m1y)), 0),
      createMinotaur(Math.min(COLS-2, Math.max(1, m2x)), Math.min(ROWS-2, Math.max(1, m2y)), 1)
    ];
    frameCounter = 0;
  }
  
  function startGame() {
    if (gameRunning) return;
    resetGame();
    gameRunning = true;
    statusDiv.innerText = "START IN 5 SECONDS";
    playSound(soundStart);
    startBackgroundMusic(); // start background music on game start
    startCountdown();
  }
  
  function restartGame() {
    if (gameRunning) {
      resetGame();
      gameRunning = true;
      statusDiv.innerText = "START IN 5 SECONDS";
      playSound(soundStart);
      restartBackgroundMusic(); // restart background music on restart
      startCountdown();
    } else {
      startGame();
    }
  }
  
  // Fullscreen
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(err => {
        console.warn(`Fullscreen error: ${err.message}`);
      });
    } else {
      document.exitFullscreen();
    }
  }
  fullscreenBtn.addEventListener("click", toggleFullscreen);
  
  function handleKey(e) {
    const key = e.key;
    const action = keyActions[key];
    if (action && gameRunning && !countdownActive) {
      e.preventDefault();
      tryMovePlayer(action.pid, action.dx, action.dy);
    }
    if (key === "ArrowUp" || key === "ArrowDown" || key === "ArrowLeft" || key === "ArrowRight") {
      e.preventDefault();
    }
  }
  
  function gameLoop() {
    if (gameRunning && !countdownActive) {
      frameCounter++;
      moveMinotaurs();
      handleEscapesAndDeaths();
      checkGameEnd();
    }
    draw();
    requestAnimationFrame(gameLoop);
  }
  
  window.addEventListener("keydown", handleKey);
  
  resetGame();
  gameLoop();
  
  window.startGame = startGame;
  window.restartGame = restartGame;
</script>
</body>
