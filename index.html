)?minotaurImg1:minotaurImg2;const imgW=TILE-4;const imgH=TILE-4;const xOff=m.x*TILE+2;const yOff=m.y*TILE+2;if(img.complete&&img.naturalWidth>0&&imagesLoaded){ctx.drawImage(img,xOff,yOff,imgW,imgH);if(m.chasing){ctx.save();ctx.shadowBlur=12;ctx.shadowColor="#ff6600";ctx.drawImage(img,xOff,yOff,imgW,imgH);ctx.restore();}}else{ctx.fillStyle=m.chasing?"#e85d3a":"#ac4e3b";ctx.beginPath();ctx.roundRect(xOff,yOff,imgW,imgH,8);ctx.fill();ctx.fillStyle="#2b1e0f";ctx.beginPath();ctx.arc(m.x*TILE+TILE/2-6,m.y*TILE+TILE/2-4,3,0,Math.PI*2);ctx.arc(m.x*TILE+TILE/2+6,m.y*TILE+TILE/2-4,3,0,Math.PI*2);ctx.fill();ctx.fillStyle="white";ctx.beginPath();ctx.arc(m.x*TILE+TILE/2-7,m.y*TILE+TILE/2-5,1.2,0,Math.PI*2);ctx.arc(m.x*TILE+TILE/2+5,m.y*TILE+TILE/2-5,1.2,0,Math.PI*2);ctx.fill();}}for(let p of players){if(p.alive&&!p.escaped){ctx.fillStyle=p.color;ctx.beginPath();ctx.roundRect(p.x*TILE+5,p.y*TILE+5,TILE-10,TILE-10,8);ctx.fill();ctx.fillStyle="white";ctx.font=`bold ${Math.floor(TILE*0.55)}px monospace`;ctx.fillText("⚡",p.x*TILE+TILE/2-8,p.y*TILE+TILE/2+6);}else if(p.escaped){ctx.globalAlpha=0.85;ctx.fillStyle="#f5e67b";ctx.beginPath();ctx.arc(p.x*TILE+TILE/2,p.y*TILE+TILE/2,12,0,Math.PI*2);ctx.fill();ctx.fillStyle="#ffc107";ctx.font=`bold ${Math.floor(TILE*0.5)}px monospace`;ctx.fillText("✨",p.x*TILE+TILE/2-8,p.y*TILE+TILE/2+6);ctx.globalAlpha=1;}}if(currentDifficulty!=="normal"&&gameRunning&&!countdownActive){for(let y=0;y<ROWS;y++){for(let x=0;x<COLS;x++){const opac=visibility[y][x];if(opac>0){ctx.fillStyle=`rgba(0,0,0,${opac})`;ctx.fillRect(x*TILE,y*TILE,TILE,TILE);}}}}if(countdownActive){ctx.fillStyle="rgba(0,0,0,0.7)";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.font="bold 64px monospace";ctx.fillStyle="#ffffff";ctx.shadowBlur=8;ctx.shadowColor="#000000";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(countdownSeconds.toString(),canvas.width/2,canvas.height/2);ctx.font="24px monospace";ctx.fillStyle="#ffcc88";ctx.fillText("GET READY!",canvas.width/2,canvas.height/2+80);ctx.textAlign="left";ctx.shadowBlur=0;}}if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(w<2*r)r=w/2;if(h<2*r)r=h/2;this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();return this;};}function startCountdown(){if(countdownInterval)clearInterval(countdownInterval);countdownActive=true;countdownSeconds=5;countdownInterval=setInterval(()=>{if(countdownActive&&countdownSeconds>1){countdownSeconds--;}else if(countdownActive&&countdownSeconds===1){countdownSeconds--;clearInterval(countdownInterval);countdownActive=false;countdownInterval=null;statusDiv.innerText="RUN TO THE DOOR!";setTimeout(()=>{if(gameRunning&&!countdownActive)statusDiv.innerText="ESCAPE OR BE EATEN";},1500);}},1000);}function resetGame(){if(endSoundTimeout)clearTimeout(endSoundTimeout);if(countdownInterval)clearInterval(countdownInterval);countdownActive=false;countdownInterval=null;gameRunning=false;const{maze:newMaze,exitX,exitY}=generateMazeWithRandomExit();maze=newMaze;exitPos={x:exitX,y:exitY};players=[{x:1,y:1,color:"#3efff0",colorName:"Wren",alive:true,escaped:false},{x:COLS-2,y:1,color:"#f5e56b",colorName:"Luke",alive:true,escaped:false},{x:1,y:ROWS-2,color:"#ff8cd9",colorName:"Amy",alive:true,escaped:false},{x:COLS-3,y:ROWS-2,color:"#a5ff7e",colorName:"Tony",alive:true,escaped:false}];const startCoords=[[1,1],[COLS-2,1],[1,ROWS-2],[COLS-3,ROWS-2]];for(let[sx,sy]of startCoords){if(maze[sy][sx]===1)maze[sy][sx]=0;}const midX=Math.floor(COLS/2);const midY=Math.floor(ROWS/2);let m1x=midX,m1y=midY;let m2x=midX+2,m2y=midY+1;for(let tries=0;tries<20;tries++){if(maze[m1y]&&maze[m1y][m1x]===0)break;m1x=midX+(tries%3)-1;m1y=midY+Math.floor(tries/3)-1;}for(let tries=0;tries<20;tries++){if(maze[m2y]&&maze[m2y][m2x]===0&&(m2x!==m1x||m2y!==m1y))break;m2x=midX+2+(tries%4)-2;m2y=midY+1+Math.floor(tries/4)-1;}minotaurs=[createMinotaur(Math.min(COLS-2,Math.max(1,m1x)),Math.min(ROWS-2,Math.max(1,m1y)),0),createMinotaur(Math.min(COLS-2,Math.max(1,m2x)),Math.min(ROWS-2,Math.max(1,m2y)),1)];for(let y=0;y<ROWS;y++){for(let x=0;x<COLS;x++){visibility[y][x]=1;}}updateVisibility();frameCounter=0;}function startGame(){if(gameRunning)return;resetGame();gameRunning=true;statusDiv.innerText="START IN 5 SECONDS";playSound(soundStart);startBackgroundMusic();startCountdown();}function restartGame(){if(gameRunning){resetGame();gameRunning=true;statusDiv.innerText="START IN 5 SECONDS";playSound(soundStart);startBackgroundMusic();startCountdown();}else{startGame();}}const fullscreenBtn=document.getElementById("fullscreenBtn");function toggleFullscreen(){if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(err=>console.warn(err));}else{document.exitFullscreen();}}fullscreenBtn.addEventListener("click",toggleFullscreen);function handleKey(e){const key=e.key;const action=keyActions[key];if(e.repeat)return;if(action&&gameRunning&&!countdownActive){e.preventDefault();tryMovePlayer(action.pid,action.dx,action.dy);}if(key==="ArrowUp"||key==="ArrowDown"||key==="ArrowLeft"||key==="ArrowRight"){e.preventDefault();}}const dpadButtons=document.querySelectorAll('.dpad-btn');dpadButtons.forEach(btn=>{const dx=parseInt(btn.getAttribute('data-dx'));const dy=parseInt(btn.getAttribute('data-dy'));const handleMove=(e)=>{e.preventDefault();if(gameRunning&&!countdownActive){tryMovePlayer(1,dx,dy);}};btn.addEventListener('mousedown',handleMove);btn.addEventListener('touchstart',handleMove,{passive:false});});function gameLoop(){if(gameRunning&&!countdownActive){frameCounter++;moveMinotaurs();handleEscapesAndDeaths();checkGameEnd();updateVisibility();}draw();requestAnimationFrame(gameLoop);}window.addEventListener("keydown",handleKey);resetGame();gameLoop();window.startGame=startGame;window.restartGame=restartGame;</script></body></html>
