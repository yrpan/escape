l; },5000); } } function updateVisibility(){ if(currentDifficulty==="normal") return; for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) visibility[y][x]=1; for(let p of players){ if(!p.alive||p.escaped||p.isAI) continue; for(let dy=-MAX_VIS_DIST;dy<=MAX_VIS_DIST;dy++) for(let dx=-MAX_VIS_DIST;dx<=MAX_VIS_DIST;dx++){ const nx=p.x+dx, ny=p.y+dy; if(nx<0||nx>=COLS||ny<0||ny>=ROWS) continue; if(!(dx===0||dy===0||Math.abs(dx)===Math.abs(dy))) continue; const dist=Math.max(Math.abs(dx),Math.abs(dy)); if(dist>MAX_VIS_DIST) continue; if(!hasLineOfSight(p.x,p.y,nx,ny)) continue; let opacity=1; if(dist<=VISION_RADIUS) opacity=0; else if(dist<=MAX_VIS_DIST) opacity=0.8; if(opacity<visibility[ny][nx]) visibility[ny][nx]=opacity; } } } function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) if(maze[y][x]===1){ ctx.fillStyle="#3a3f4e"; ctx.fillRect(x*TILE,y*TILE,TILE,TILE); ctx.fillStyle="#2a2e3a"; ctx.fillRect(x*TILE+2,y*TILE+2,TILE-4,TILE-4); } if(exitImg.complete && exitLoaded) ctx.drawImage(exitImg,exitPos.x*TILE,exitPos.y*TILE,TILE,TILE); else{ ctx.fillStyle="#2d8f4a"; ctx.fillRect(exitPos.x*TILE,exitPos.y*TILE,TILE,TILE); ctx.fillStyle="#6fef8a"; ctx.fillRect(exitPos.x*TILE+6,exitPos.y*TILE+6,TILE-12,TILE-12); } if(object1.active && (currentDifficulty==="normal"||visibility[object1.y]?.[object1.x]<1)){ if(object1Img.complete&&obj1Loaded) ctx.drawImage(object1Img,object1.x*TILE,object1.y*TILE,TILE,TILE); else{ ctx.fillStyle="#ffaa44"; ctx.fillRect(object1.x*TILE+4,object1.y*TILE+4,TILE-8,TILE-8); } } if(object2.active && (currentDifficulty==="normal"||visibility[object2.y]?.[object2.x]<1)){ if(object2Img.complete&&obj2Loaded) ctx.drawImage(object2Img,object2.x*TILE,object2.y*TILE,TILE,TILE); else{ ctx.fillStyle="#aa66ff"; ctx.fillRect(object2.x*TILE+4,object2.y*TILE+4,TILE-8,TILE-8); } } for(let m of minotaurs) if(currentDifficulty==="normal"||visibility[m.y][m.x]<1){ const img=m.id===0?minotaurImg1:minotaurImg2; if(img.complete&&imagesLoaded) ctx.drawImage(img,m.x*TILE+2,m.y*TILE+2,TILE-4,TILE-4); else{ ctx.fillStyle=m.chasing?"#e85d3a":"#ac4e3b"; ctx.fillRect(m.x*TILE+2,m.y*TILE+2,TILE-4,TILE-4); } } for(let i=0;i<players.length;i++){ const p=players[i]; const isVisible = (currentDifficulty === "normal" || visibility[p.y]?.[p.x] < 1); if(!isVisible) continue; if(p.alive && !p.escaped){ ctx.fillStyle=p.color; ctx.beginPath(); ctx.roundRect(p.x*TILE+5,p.y*TILE+5,TILE-10,TILE-10,8); ctx.fill(); if(isPlayerConfused(i)){ ctx.fillStyle="#ff00aa"; ctx.font="bold 18px monospace"; ctx.fillText("🌀",p.x*TILE+22,p.y*TILE+24); } else { ctx.fillStyle="white"; ctx.font=`bold ${Math.floor(TILE*0.55)}px monospace`; ctx.fillText("⚡",p.x*TILE+TILE/2-8,p.y*TILE+TILE/2+6); } } else if(p.escaped){ ctx.globalAlpha=0.85; ctx.fillStyle="#f5e67b"; ctx.beginPath(); ctx.arc(p.x*TILE+TILE/2,p.y*TILE+TILE/2,12,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#ffc107"; ctx.font=`bold ${Math.floor(TILE*0.5)}px monospace`; ctx.fillText("✨",p.x*TILE+TILE/2-8,p.y*TILE+TILE/2+6); ctx.globalAlpha=1; } } if(currentDifficulty!=="normal" && gameRunning && !countdownActive){ for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) if(visibility[y][x]>0){ ctx.fillStyle=`rgba(0,0,0,${visibility[y][x]})`; ctx.fillRect(x*TILE,y*TILE,TILE,TILE); } } if(countdownActive){ ctx.fillStyle="rgba(0,0,0,0.7)"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.font="bold 64px monospace"; ctx.fillStyle="#fff"; ctx.textAlign="center"; ctx.fillText(countdownSeconds.toString(),canvas.width/2,canvas.height/2); ctx.font="24px monospace"; ctx.fillStyle="#ffcc88"; ctx.fillText("GET READY!",canvas.width/2,canvas.height/2+80); ctx.textAlign="left"; } } function resetGame(){ if(endSoundTimeout) clearTimeout(endSoundTimeout); if(countdownInterval) clearInterval(countdownInterval); countdownActive=false; countdownInterval=null; gameRunning=false; const {maze:newMaze,exitX,exitY}=generateMazeWithRandomExit(); maze=newMaze; exitPos={x:exitX,y:exitY}; const basePlaye
